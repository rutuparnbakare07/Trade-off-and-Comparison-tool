<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Decision Assistant by Rutuparn</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

<style>
:root {
    --sidebar-bg: #0f172a;
    --sidebar-hover: #1e293b;
    --accent: #38bdf8;
    --bg-main: #f8fafc;
    --text-main: #334155;
    --white: #ffffff;
    --border: #e2e8f0;
}

* { box-sizing: border-box; font-family: 'Inter', sans-serif; margin: 0; padding: 0; }

body { display: flex; height: 100vh; }

.sidebar {
    width: 350px;
    background: var(--sidebar-bg);
    color: white;
    padding: 25px;
}

.main-stage {
    flex: 1;
    padding: 40px;
}

.stage-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
}

.header-right {
    display: flex;
    gap: 10px;
    align-items: center;
}

.login-btn {
    padding: 8px 14px;
    border: none;
    border-radius: 6px;
    background: var(--accent);
    cursor: pointer;
}
</style>
</head>

<body>

<aside class="sidebar">
    <h2>Decision Assistant</h2>
</aside>

<main class="main-stage">

<header class="stage-header">
    <h2>Technical Analysis Report</h2>

    <div class="header-right">
        <span id="timestamp">System Idle</span>

        <!-- ✅ REAL LOGOUT BUTTON -->
        <button class="login-btn" onclick="logout()">Logout</button>
    </div>
</header>

<div>
    <p>Your tool UI here...</p>
</div>

</main>

<!-- 🔐 FIREBASE AUTH PROTECTION + LOGOUT -->
<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getAuth, onAuthStateChanged, signOut } 
from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

/* 🔥 SAME CONFIG AS LOGIN PAGE */
const firebaseConfig = {
  apiKey: "AIzaSyCDoCc65V7PoQyUTnMKiSQAv0x8lUnpnAU",
  authDomain: "comparison-and-decision-tool.firebaseapp.com",
  projectId: "comparison-and-decision-tool",
  storageBucket: "comparison-and-decision-tool.firebasestorage.app",
  messagingSenderId: "872413042366",
  appId: "1:872413042366:web:3b4019ad9cf230f33b30ef"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);

/* ✅ PROTECT PAGE */
onAuthStateChanged(auth, (user) => {
    if (!user) {
        window.location.href = "index.html";
    }
});

/* ✅ LOGOUT FUNCTION */
window.logout = function() {
    signOut(auth).then(() => {
        window.location.href = "index.html";
    });
};

</script>

</body>
</html>
